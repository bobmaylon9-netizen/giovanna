<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Acesso Exclusivo</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: Arial, sans-serif;
    }

    body {
      height: 100vh;
      background: url('foto.jpg') no-repeat center center/cover;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .overlay {
      background: rgba(0,0,0,0.65);
      position: absolute;
      width: 100%;
      height: 100%;
      top: 0;
      left: 0;
    }

    .content {
      position: relative;
      z-index: 2;
      text-align: center;
      color: #fff;
      padding: 20px;
      max-width: 400px;
    }

    h1 {
      font-size: 28px;
      color: #ff4da6;
      margin-bottom: 15px;
    }

    p {
      font-size: 16px;
      margin-bottom: 25px;
      line-height: 1.5;
    }

    .btn {
      display: inline-block;
      padding: 16px 30px;
      background: linear-gradient(45deg, #ff4da6, #ff1a75);
      color: #fff;
      text-decoration: none;
      font-weight: bold;
      border-radius: 40px;
      transition: 0.3s ease;
      box-shadow: 0 0 20px rgba(255, 77, 166, 0.7);
    }

    .btn:hover {
      background: linear-gradient(45deg, #ff1a75, #ff4da6);
      transform: scale(1.08);
      box-shadow: 0 0 30px rgba(255, 77, 166, 1);
    }

  </style>
</head>
<body>

  <div class="overlay"></div>

  <div class="content">
    <h1>Acesso VIP 🔥</h1>
    <p>Você está a um clique de entrar no meu conteúdo mais exclusivo… amor 🌸💖</p>
    
    <a class="btn" href="https://t.me/Giovanna_gigi" target="_blank">
      💖 ENTRAR AGORA 🔥
    </a>
  </div>

</body>
</html>
